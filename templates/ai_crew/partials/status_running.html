<div id="status-panel" 
     hx-get="{% url 'ai_crew:task_status' task_id %}" 
     hx-trigger="every 2s" 
     hx-swap="outerHTML"
     class="mt-10 border border-ink-950 bg-white shadow-[8px_8px_0px_0px_rgba(0,0,0,0.05)] overflow-hidden transition-all duration-500"
     _="on load transition my opacity from 0 to 1 over 400ms">
    
    <!-- ── Header ────────────────────────────────────────────────────────── -->
    <div class="bg-ink-950 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-200">System.Exec: AI_PIPELINE_STIGMA</p>
        </div>
        <span id="elapsed-time" 
              class="font-mono text-[10px] text-ink-400"
              _="on load repeat every 1s 
                 set elapsed to (Date.now() - {{ start_time }}) / 1000
                 set mins to Math.floor(elapsed / 60)
                 set secs to Math.floor(elapsed % 60)
                 put `${mins}m ${String(secs).padStart(2,'0')}s` into me">
            0m 00s
        </span>
    </div>

    <div class="p-6">
        <!-- ── Progress ────────────────────────────────────────────────────── -->
        <div class="mb-8">
            <div class="flex justify-between items-end mb-2">
                <p class="font-mono text-xs text-ink-900 font-bold uppercase tracking-wider">{{ message|default:"Processing..." }}</p>
                <p class="font-mono text-xs text-ink-400">{{ progress }}%</p>
            </div>
            <div class="bg-ink-100 h-1.5 w-full relative overflow-hidden">
                <!-- Scanning Effect Overlay -->
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent w-20 animate-[scan_2s_linear_infinite] z-10"></div>
                <div id="progress-bar" 
                     class="h-full bg-ink-950 transition-all duration-700 ease-out relative" 
                     style="width: {{ progress }}%"
                     _="on load set :pct to {{ progress }} 
                        repeat every 1s 
                          if :pct < 98 then 
                            increment :pct by 0.05 
                            set my.style.width to `${:pct}%`
                          end">
                </div>
            </div>
        </div>

        <!-- ── Live Terminal Log ─────────────────────────────────────────── -->
        <div class="mb-8">
            <p class="font-mono text-[10px] uppercase text-ink-400 mb-2 tracking-widest">Agent Thought Stream</p>
            <div id="terminal-log" 
                 class="bg-ink-900 rounded-sm p-4 h-40 overflow-y-auto font-mono text-[11px] leading-relaxed text-ink-300 custom-scrollbar"
                 _="on load scroll to bottom">
                {% if logs %}
                    {% for log in logs %}
                    <div class="flex gap-2 mb-1">
                        <span class="text-ink-500 cursor-default prose-none">›</span>
                        <span class="{% if forloop.last %}text-white animate-pulse{% endif %}">{{ log }}</span>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="text-ink-500 italic">Waiting for agent broadcast...</div>
                {% endif %}
                <div class="w-2 h-4 bg-ink-400 inline-block animate-[blink_1s_step-end_infinite] ml-1"></div>
            </div>
        </div>

        <!-- ── Agent Status Grid ─────────────────────────────────────────── -->
        <div class="grid grid-cols-3 gap-4 border-t border-ink-100 pt-6">
            <div class="text-center">
                <p class="font-mono text-[9px] uppercase text-ink-400 mb-1">Researcher</p>
                <div class="w-1.5 h-1.5 mx-auto rounded-full {% if progress > 20 %}bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]{% else %}bg-ink-200 animate-pulse{% endif %}"></div>
            </div>
            <div class="text-center">
                <p class="font-mono text-[9px] uppercase text-ink-400 mb-1">Writer</p>
                <div class="w-1.5 h-1.5 mx-auto rounded-full {% if progress > 60 %}bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]{% else %}bg-ink-200 {% if progress > 20 %}animate-pulse{% endif %}{% endif %}"></div>
            </div>
            <div class="text-center">
                <p class="font-mono text-[9px] uppercase text-ink-400 mb-1">Editor</p>
                <div class="w-1.5 h-1.5 mx-auto rounded-full {% if progress > 88 %}bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]{% else %}bg-ink-200 {% if progress > 60 %}animate-pulse{% endif %}{% endif %}"></div>
            </div>
        </div>
    </div>

    <!-- Hidden animations helper -->
    <style>
        @keyframes scan { from { transform: translateX(-100%); } to { transform: translateX(500%); } }
        @keyframes blink { 50% { opacity: 0; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; }
    </style>
</div>
