<div id="status-panel" 
     class="mt-10 border-2 border-ink-950 bg-white shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] p-8 overflow-hidden"
     _="on load transition my opacity from 0 to 1 over 500ms then transition my transform from 'translateY(20px)' to 'translateY(0)' over 400ms">
    
    <div class="flex items-center justify-between mb-8 border-b-2 border-ink-950 pb-4">
        <div class="flex items-center gap-3">
            <div class="w-5 h-5 bg-ink-950 flex items-center justify-center text-white text-[10px]">✓</div>
            <p class="font-mono text-xs tracking-[0.3em] uppercase text-ink-900 font-black">Generation Successful</p>
        </div>
        <p class="font-mono text-[10px] text-ink-400 uppercase tracking-widest">Saved as Draft</p>
    </div>

    <div class="mb-8">
        <h2 class="font-display text-2xl font-black text-ink-950 mb-3 leading-tight">{{ task.post_title }}</h2>
        <div class="flex items-center gap-4 mb-4">
            <div class="flex items-center gap-1.5 bg-ink-100 px-2 py-1">
                <span class="font-mono text-[10px] uppercase text-ink-500">Reading Time:</span>
                <span class="font-mono text-[10px] font-bold text-ink-900">{{ task.reading_time|default:"5" }} min</span>
            </div>
            {% if task.tags %}
            <div class="flex gap-2">
                {% for tag in task.tags|slice:":3" %}
                <span class="font-mono text-[10px] text-ink-400">#{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
        <div class="prose-none bg-ink-50 border-l-4 border-ink-300 p-4 mb-6">
            <p class="font-body text-sm text-ink-600 leading-relaxed italic">
                "{{ task.excerpt|truncatechars:240 }}"
            </p>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
        <a href="{{ task.post_admin_url }}"
           class="group flex items-center justify-between border-2 border-ink-950 bg-ink-950 text-white px-6 py-4 hover:bg-white hover:text-ink-950 transition-all duration-300">
            <span class="font-mono text-xs tracking-widest uppercase font-bold">Edit Content</span>
            <span class="group-hover:translate-x-1 transition-transform">→</span>
        </a>
        <a href="{{ task.post_public_url }}"
           class="group flex items-center justify-between border-2 border-ink-950 px-6 py-4 hover:bg-ink-50 transition-all duration-300">
            <span class="font-mono text-xs tracking-widest uppercase text-ink-900">Live Preview</span>
            <span class="group-hover:translate-x-1 transition-transform">↗</span>
        </a>
    </div>

    <div class="flex items-center justify-center border-t border-ink-100 pt-6">
        <button _="on click reload() the location"
                class="font-mono text-[11px] tracking-widest uppercase text-ink-400 hover:text-ink-950 transition-colors flex items-center gap-2">
            <span>+</span> Generate Another Post
        </button>
    </div>
</div>
