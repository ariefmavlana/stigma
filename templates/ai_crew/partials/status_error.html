<div id="status-panel" class="mt-10 border border-ink-300 bg-white p-6 border-l-4 border-red-400">
    <p class="font-mono text-xs uppercase tracking-wider text-red-600 mb-2">Generation Failed</p>
    <p class="font-body text-sm text-red-800">{{ task.error|default:"An unknown error occurred." }}</p>
    <button _="on click reload() the location"
            class="font-mono text-xs tracking-widest uppercase text-ink-500 mt-3 hover:text-ink-900 transition-colors">
        ← Try Again
    </button>
</div>
